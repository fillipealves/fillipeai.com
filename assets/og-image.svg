<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <rect width="1080" height="1080" fill="#050505"/>
  <rect x="20" y="20" width="1040" height="1040" rx="24" fill="none" stroke="#00ff41" stroke-width="4" opacity="0.3"/>

  <!-- Cantos decorativos -->
  <g stroke="#00ff41" stroke-width="3" opacity="0.4" fill="none">
    <path d="M60 160 L60 60 L160 60"/>
    <path d="M920 60 L1020 60 L1020 160"/>
    <path d="M60 920 L60 1020 L160 1020"/>
    <path d="M920 1020 L1020 1020 L1020 920"/>
  </g>

  <!-- Letras FA grandes centralizadas -->
  <text x="540" y="520"
    font-family="'Courier New', monospace"
    font-weight="700" font-size="380"
    text-anchor="middle"
    fill="#00ff41" opacity="0.12">FA</text>

  <!-- Tagline principal -->
  <text x="540" y="430"
    font-family="'Courier New', monospace"
    font-weight="700" font-size="88"
    text-anchor="middle"
    fill="#ffffff">Fillipe AI</text>

  <!-- Linha divisória -->
  <line x1="240" y1="470" x2="840" y2="470"
        stroke="#00ff41" stroke-width="2" opacity="0.4"/>

  <!-- Subtítulo -->
  <text x="540" y="540"
    font-family="'Courier New', monospace"
    font-size="36" text-anchor="middle"
    fill="#00ff41" opacity="0.9" letter-spacing="2">
    Transformando problemas reais
  </text>
  <text x="540" y="586"
    font-family="'Courier New', monospace"
    font-size="36" text-anchor="middle"
    fill="#00ff41" opacity="0.9" letter-spacing="2">
    em soluções reais.
  </text>

  <!-- Serviços -->
  <text x="540" y="680"
    font-family="'Courier New', monospace"
    font-size="26" text-anchor="middle"
    fill="#888" letter-spacing="1">
    Sistemas  ·  Automações  ·  Sites  ·  Consultoria
  </text>

  <!-- URL -->
  <text x="540" y="780"
    font-family="'Courier New', monospace"
    font-weight="700" font-size="32"
    text-anchor="middle"
    fill="#00ff41" opacity="0.6" letter-spacing="4">
    fillipeai.com
  </text>

  <!-- Ponto terminal -->
  <circle cx="540" cy="860" r="10" fill="#00ff41"/>
</svg>
