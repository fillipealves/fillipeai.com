<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d1a0d"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="1080" height="1080" rx="180" fill="url(#bgGlow)"/>

  <!-- Borda externa verde -->
  <rect x="18" y="18" width="1044" height="1044" rx="165"
        fill="none" stroke="#00ff41" stroke-width="6" opacity="0.25"/>

  <!-- Borda interna verde (mais sutil) -->
  <rect x="36" y="36" width="1008" height="1008" rx="150"
        fill="none" stroke="#00ff41" stroke-width="2" opacity="0.1"/>

  <!-- Grid de pontos decorativos (matrix feel) -->
  <g opacity="0.06" fill="#00ff41">
    <circle cx="100" cy="100" r="4"/><circle cx="180" cy="100" r="4"/><circle cx="260" cy="100" r="4"/>
    <circle cx="820" cy="100" r="4"/><circle cx="900" cy="100" r="4"/><circle cx="980" cy="100" r="4"/>
    <circle cx="100" cy="180" r="4"/><circle cx="100" cy="260" r="4"/>
    <circle cx="980" cy="180" r="4"/><circle cx="980" cy="260" r="4"/>
    <circle cx="100" cy="820" r="4"/><circle cx="100" cy="900" r="4"/><circle cx="100" cy="980" r="4"/>
    <circle cx="980" cy="820" r="4"/><circle cx="980" cy="900" r="4"/><circle cx="980" cy="980" r="4"/>
    <circle cx="180" cy="980" r="4"/><circle cx="260" cy="980" r="4"/>
    <circle cx="820" cy="980" r="4"/><circle cx="900" cy="980" r="4"/>
  </g>

  <!-- Linhas decorativas cantos -->
  <g stroke="#00ff41" stroke-width="2" opacity="0.15" fill="none">
    <path d="M80 200 L80 80 L200 80"/>
    <path d="M880 80 L1000 80 L1000 200"/>
    <path d="M80 880 L80 1000 L200 1000"/>
    <path d="M880 1000 L1000 1000 L1000 880"/>
  </g>

  <!-- Círculo decorativo central suave -->
  <circle cx="540" cy="540" r="380" fill="none"
          stroke="#00ff41" stroke-width="1" opacity="0.06" stroke-dasharray="8 12"/>

  <!-- Letras FA -->
  <text
    x="540" y="620"
    font-family="'Courier New', Courier, monospace"
    font-weight="700"
    font-size="420"
    text-anchor="middle"
    fill="#00ff41"
    filter="url(#glow)"
    letter-spacing="-20"
  >FA</text>

  <!-- Linha separadora abaixo do texto -->
  <line x1="200" y1="710" x2="880" y2="710"
        stroke="#00ff41" stroke-width="3" opacity="0.3"/>

  <!-- Tag "fillipeai.com" abaixo -->
  <text
    x="540" y="790"
    font-family="'Courier New', Courier, monospace"
    font-weight="400"
    font-size="52"
    text-anchor="middle"
    fill="#00ff41"
    opacity="0.5"
    letter-spacing="8"
  >fillipeai.com</text>

  <!-- Ponto verde pulsante (canto inferior direito) -->
  <circle cx="900" cy="900" r="28" fill="#00ff41" opacity="0.15" filter="url(#glowStrong)"/>
  <circle cx="900" cy="900" r="16" fill="#00ff41" opacity="0.5" filter="url(#glow)"/>
  <circle cx="900" cy="900" r="9"  fill="#00ff41"/>
</svg>
