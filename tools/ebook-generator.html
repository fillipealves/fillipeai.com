<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ebook Generator — Tools</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0f0f0f;color:#e5e5e5;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
  header{padding:1rem 2rem;border-bottom:1px solid #222;display:flex;align-items:center;gap:1rem;flex-shrink:0}
  header a{color:#888;text-decoration:none;font-size:.85rem}
  header a:hover{color:#fff}
  header span.sep{color:#444}
  header h1{font-size:1.1rem;font-weight:600;color:#fff}
  .badge{background:#1a1a1a;border:1px solid #333;border-radius:4px;padding:2px 8px;font-size:.75rem;color:#888}
  .badge.ai{border-color:#6366f1;color:#a5b4fc}

  main{flex:1;display:grid;grid-template-columns:400px 1fr;overflow:hidden;height:calc(100vh - 57px)}

  /* LEFT SIDEBAR */
  .sidebar{border-right:1px solid #222;display:flex;flex-direction:column;overflow:hidden}
  .sidebar-section{padding:1rem 1.25rem;border-bottom:1px solid #1a1a1a}
  .sidebar-section label{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#555;margin-bottom:.4rem}
  .sidebar-section small{font-size:.72rem;color:#444;margin-top:.3rem;display:block}

  input[type=text],input[type=password],select,textarea{width:100%;background:#141414;border:1px solid #252525;border-radius:6px;color:#e5e5e5;font-family:inherit;font-size:.85rem;padding:.55rem .75rem;outline:none;transition:border-color .2s}
  input[type=text]:focus,input[type=password]:focus,select:focus,textarea:focus{border-color:#444}
  select option{background:#141414}
  textarea{resize:vertical;line-height:1.5}

  .key-row{display:flex;gap:.4rem}
  .key-row input{flex:1}
  .btn-icon{background:#1a1a1a;border:1px solid #252525;border-radius:6px;color:#666;cursor:pointer;padding:.55rem .65rem;font-size:.85rem;flex-shrink:0;transition:all .2s}
  .btn-icon:hover{background:#222;color:#aaa}

  .prompt-area{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:1rem 1.25rem;gap:.5rem}
  .prompt-area label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:#555;flex-shrink:0}
  .prompt-area textarea{flex:1;min-height:80px;font-size:.8rem}

  .generate-footer{padding:1rem 1.25rem;border-top:1px solid #1a1a1a;display:flex;flex-direction:column;gap:.5rem}
  .btn{width:100%;padding:.7rem 1.25rem;border-radius:8px;border:none;cursor:pointer;font-size:.88rem;font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.45rem}
  .btn-generate{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
  .btn-generate:hover:not(:disabled){background:linear-gradient(135deg,#4f52d6,#7c3aed);transform:translateY(-1px)}
  .btn-generate:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn-stop{background:#3f1a1a;border:1px solid #7f2a2a;color:#f87171}
  .btn-stop:hover{background:#4f2020}

  .token-counter{font-size:.72rem;color:#444;text-align:center}
  .token-counter span{color:#666}

  /* RIGHT CONTENT */
  .content-panel{display:flex;flex-direction:column;overflow:hidden}
  .content-tabs{display:flex;border-bottom:1px solid #222;flex-shrink:0}
  .tab{padding:.75rem 1.25rem;font-size:.82rem;color:#555;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s}
  .tab:hover{color:#aaa}
  .tab.active{color:#e5e5e5;border-bottom-color:#6366f1}
  .tab-actions{margin-left:auto;display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem}
  .btn-sm{padding:.35rem .75rem;border-radius:6px;border:none;cursor:pointer;font-size:.78rem;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:.35rem}
  .btn-dl{background:#1a1a1a;border:1px solid #252525;color:#aaa}
  .btn-dl:hover{background:#222;color:#fff}
  .btn-dl:disabled{opacity:.3;cursor:not-allowed}
  .btn-pdf{background:#1a2a1a;border:1px solid #2a4a2a;color:#86efac}
  .btn-pdf:hover{background:#1e341e;color:#bbf7d0}
  .btn-pdf:disabled{opacity:.3;cursor:not-allowed}

  .panel-body{flex:1;overflow:auto;position:relative}

  /* Code view */
  #code-view{display:none;background:#0a0a0a;padding:1.25rem;font-family:'Cascadia Code','Fira Code',monospace;font-size:.78rem;line-height:1.6;color:#a3be8c;white-space:pre-wrap;word-break:break-word;min-height:100%;cursor:text}
  #code-view.visible{display:block}
  .cursor-blink{display:inline-block;width:2px;height:1em;background:#a3be8c;margin-left:1px;vertical-align:text-bottom;animation:blink 1s step-end infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

  /* Preview */
  #preview-frame{display:none;width:100%;height:100%;border:none;background:#fff}
  #preview-frame.visible{display:block}

  /* Empty state */
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:.75rem;color:#2a2a2a}
  .empty-state-icon{font-size:4rem;opacity:.4}
  .empty-state-text{font-size:.9rem;color:#333}
  .empty-state-sub{font-size:.78rem;color:#2a2a2a}

  /* Status bar */
  .status-bar{padding:.4rem 1.25rem;border-top:1px solid #1a1a1a;font-size:.72rem;color:#3a3a3a;display:flex;align-items:center;gap:.75rem;flex-shrink:0}
  .status-dot{width:6px;height:6px;border-radius:50%;background:#3a3a3a;flex-shrink:0}
  .status-dot.generating{background:#6366f1;animation:pulse 1.2s ease-in-out infinite}
  .status-dot.done{background:#4ade80}
  .status-dot.error{background:#f87171}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  @media(max-width:900px){
    main{grid-template-columns:1fr;grid-template-rows:auto 1fr}
    .sidebar{border-right:none;border-bottom:1px solid #222;max-height:50vh}
    .content-panel{min-height:300px}
  }
</style>
</head>
<body>

<header>
  <a href="/">fillipeai.com</a>
  <span class="sep">/</span>
  <a href="/tools">tools</a>
  <span class="sep">/</span>
  <h1>ebook-generator</h1>
  <span style="flex:1"></span>
  <span class="badge ai">Claude AI</span>
</header>

<main>
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <label>API Key (Anthropic)</label>
      <div class="key-row">
        <input type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">
        <button class="btn-icon" id="btn-save-key" title="Salvar chave">💾</button>
        <button class="btn-icon" id="btn-toggle-key" title="Mostrar/ocultar">👁️</button>
      </div>
      <small>Salva no localStorage — nunca enviada a servidores externos</small>
    </div>

    <div class="sidebar-section">
      <label>Modelo</label>
      <select id="model-select">
        <option value="claude-haiku-4-5-20251001">claude-haiku-4-5 — Rápido</option>
        <option value="claude-sonnet-4-6" selected>claude-sonnet-4-6 — Qualidade</option>
        <option value="claude-opus-4-6">claude-opus-4-6 — Máximo</option>
      </select>
    </div>

    <div class="sidebar-section">
      <label>Título do arquivo (download)</label>
      <input type="text" id="file-title" placeholder="meu-ebook" value="ebook">
    </div>

    <div class="prompt-area">
      <label>Prompt</label>
      <textarea id="prompt" placeholder="Descreva o ebook que deseja gerar...

Ex: Crie um ebook completo em HTML sobre 'Como ganhar dinheiro com IA', com 5 capítulos, design profissional em dark mode, tipografia elegante, seções de dicas práticas, exemplos reais e CTAs para cada capítulo..."></textarea>
    </div>

    <div class="generate-footer">
      <button class="btn btn-generate" id="btn-generate">
        ✦ Gerar Ebook
      </button>
      <button class="btn btn-stop" id="btn-stop" style="display:none">
        ⏹ Parar Geração
      </button>
      <div class="token-counter">
        <span id="token-info">—</span>
      </div>
    </div>
  </div>

  <!-- CONTENT PANEL -->
  <div class="content-panel">
    <div class="content-tabs">
      <div class="tab active" data-tab="preview">👁️ Prévia</div>
      <div class="tab" data-tab="code">🗒️ HTML</div>
      <div class="tab-actions">
        <button class="btn-sm btn-dl" id="btn-dl" disabled>⬇ Download HTML</button>
        <button class="btn-sm btn-pdf" id="btn-pdf" disabled>🖨 Abrir PDF</button>
      </div>
    </div>

    <div class="panel-body">
      <div class="empty-state" id="empty-state">
        <span class="empty-state-icon">✦</span>
        <span class="empty-state-text">Nenhum ebook gerado ainda</span>
        <span class="empty-state-sub">Configure sua API Key e escreva um prompt</span>
      </div>
      <div id="code-view"></div>
      <iframe id="preview-frame" sandbox="allow-same-origin allow-scripts"></iframe>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">aguardando</span>
    </div>
  </div>
</main>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let generatedHTML = '';
let abortController = null;
let activeTab = 'preview';

// ── DOM refs ───────────────────────────────────────────────────────────────
const apiKeyInput = document.getElementById('api-key');
const btnSaveKey  = document.getElementById('btn-save-key');
const btnToggleKey= document.getElementById('btn-toggle-key');
const modelSelect = document.getElementById('model-select');
const fileTitle   = document.getElementById('file-title');
const promptTA    = document.getElementById('prompt');
const btnGenerate = document.getElementById('btn-generate');
const btnStop     = document.getElementById('btn-stop');
const tokenInfo   = document.getElementById('token-info');

const emptyState  = document.getElementById('empty-state');
const codeView    = document.getElementById('code-view');
const previewFrame= document.getElementById('preview-frame');
const btnDl       = document.getElementById('btn-dl');
const btnPdf      = document.getElementById('btn-pdf');
const statusDot   = document.getElementById('status-dot');
const statusText  = document.getElementById('status-text');

// ── Persist key ───────────────────────────────────────────────────────────
const STORAGE_KEY = 'anthropic_api_key';
const saved = localStorage.getItem(STORAGE_KEY);
if (saved) apiKeyInput.value = saved;

btnSaveKey.addEventListener('click', () => {
  const k = apiKeyInput.value.trim();
  if (!k) { localStorage.removeItem(STORAGE_KEY); setStatus('Chave removida', ''); return; }
  localStorage.setItem(STORAGE_KEY, k);
  setStatus('Chave salva', 'done');
  setTimeout(() => setStatus('aguardando', ''), 2000);
});

btnToggleKey.addEventListener('click', () => {
  apiKeyInput.type = apiKeyInput.type === 'password' ? 'text' : 'password';
  btnToggleKey.textContent = apiKeyInput.type === 'password' ? '👁️' : '🙈';
});

// ── Tabs ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.dataset.tab;
    refreshViews();
  });
});

function refreshViews() {
  if (!generatedHTML) return;
  if (activeTab === 'code') {
    codeView.classList.add('visible');
    previewFrame.classList.remove('visible');
    previewFrame.style.display = 'none';
  } else {
    codeView.classList.remove('visible');
    previewFrame.classList.add('visible');
    previewFrame.style.display = 'block';
  }
}

// ── Status helper ─────────────────────────────────────────────────────────
function setStatus(text, type) {
  statusText.textContent = text;
  statusDot.className = 'status-dot' + (type ? ' ' + type : '');
}

// ── Extract HTML from Claude response ─────────────────────────────────────
function extractHTML(raw) {
  // Prefer ```html ... ``` blocks
  const match = raw.match(/```html\s*([\s\S]*?)```/i);
  if (match) return match[1].trim();
  // Fallback: find <!DOCTYPE or <html
  const dtMatch = raw.match(/(<!DOCTYPE[\s\S]*)/i);
  if (dtMatch) return dtMatch[1].trim();
  // Last resort: return raw
  return raw.trim();
}

// ── Live preview update (throttled) ───────────────────────────────────────
let previewPending = false;
function schedulePreviewUpdate() {
  if (previewPending) return;
  previewPending = true;
  setTimeout(() => {
    previewPending = false;
    if (activeTab === 'preview' && generatedHTML) {
      const blob = new Blob([generatedHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const prev = previewFrame.src;
      previewFrame.src = url;
      if (prev && prev.startsWith('blob:')) URL.revokeObjectURL(prev);
    }
  }, 600);
}

// ── Generate ──────────────────────────────────────────────────────────────
btnGenerate.addEventListener('click', generate);
promptTA.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') generate();
});

async function generate() {
  const key = apiKeyInput.value.trim() || localStorage.getItem(STORAGE_KEY) || '';
  if (!key) { alert('Insira sua API Key da Anthropic.'); apiKeyInput.focus(); return; }
  const prompt = promptTA.value.trim();
  if (!prompt) { alert('Escreva um prompt primeiro.'); promptTA.focus(); return; }

  // Reset
  generatedHTML = '';
  codeView.textContent = '';
  codeView.classList.remove('visible');
  previewFrame.classList.remove('visible');
  previewFrame.style.display = 'none';
  emptyState.style.display = 'none';
  btnDl.disabled = true;
  btnPdf.disabled = true;

  btnGenerate.style.display = 'none';
  btnStop.style.display = 'flex';
  setStatus('gerando...', 'generating');

  // Show code view as we stream
  if (activeTab === 'code') {
    codeView.classList.add('visible');
  }
  // Add blinking cursor
  const cursor = document.createElement('span');
  cursor.className = 'cursor-blink';
  codeView.appendChild(cursor);
  codeView.style.display = 'block';

  abortController = new AbortController();
  let rawBuffer = '';
  let inputTokens = 0;
  let outputTokens = 0;

  try {
    const systemPrompt = `Você é um designer e redator especializado em ebooks digitais.
Gere SEMPRE um arquivo HTML completo e autocontido (sem dependências externas exceto Google Fonts CDN).
O HTML deve:
- Ser um ebook visual, profissional e bem diagramado
- Usar design moderno com tipografia elegante
- Incluir sumário clicável (âncoras internas)
- Ter CSS embutido no <style> (dark mode ou light, conforme o tema)
- Incluir @media print para impressão/PDF (sem URLs visíveis, margens adequadas)
- Ter todos os capítulos completos e detalhados
- Retornar SOMENTE o código HTML entre \`\`\`html e \`\`\` (sem explicações fora do bloco)`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-allow-browser': 'true',
      },
      body: JSON.stringify({
        model: modelSelect.value,
        max_tokens: 8192,
        stream: true,
        system: systemPrompt,
        messages: [{ role: 'user', content: prompt }],
      }),
      signal: abortController.signal,
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let sseBuffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      sseBuffer += decoder.decode(value, { stream: true });
      const lines = sseBuffer.split('\n');
      sseBuffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const ev = JSON.parse(data);

          if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') {
            rawBuffer += ev.delta.text;
            // Update code view with raw response
            cursor.remove();
            codeView.textContent = rawBuffer;
            codeView.appendChild(cursor);
            codeView.scrollTop = codeView.scrollHeight;

            // Extract & update preview periodically
            generatedHTML = extractHTML(rawBuffer);
            schedulePreviewUpdate();
          }

          if (ev.type === 'message_start' && ev.message?.usage) {
            inputTokens = ev.message.usage.input_tokens || 0;
          }
          if (ev.type === 'message_delta' && ev.usage) {
            outputTokens = ev.usage.output_tokens || 0;
            tokenInfo.textContent = `↑ ${inputTokens} / ↓ ${outputTokens} tokens`;
          }
        } catch {}
      }
    }

    // Final extraction
    generatedHTML = extractHTML(rawBuffer);
    cursor.remove();

    // Final preview
    if (generatedHTML) {
      const blob = new Blob([generatedHTML], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      previewFrame.src = url;
      previewFrame.style.display = 'block';

      if (activeTab === 'preview') {
        codeView.classList.remove('visible');
        previewFrame.classList.add('visible');
      } else {
        codeView.textContent = rawBuffer;
      }

      btnDl.disabled = false;
      btnPdf.disabled = false;
      setStatus(`concluído — ${outputTokens} tokens gerados`, 'done');
    }

  } catch (err) {
    cursor.remove();
    if (err.name === 'AbortError') {
      setStatus('geração cancelada', '');
      // Still allow download if we have partial content
      if (generatedHTML) { btnDl.disabled = false; btnPdf.disabled = false; }
    } else {
      setStatus('erro: ' + err.message, 'error');
      console.error(err);
      codeView.textContent = '❌ Erro: ' + err.message + '\n\nResposta bruta:\n' + rawBuffer;
      codeView.classList.add('visible');
    }
  } finally {
    abortController = null;
    btnGenerate.style.display = 'flex';
    btnStop.style.display = 'none';
  }
}

btnStop.addEventListener('click', () => {
  if (abortController) abortController.abort();
});

// ── Download HTML ─────────────────────────────────────────────────────────
btnDl.addEventListener('click', () => {
  if (!generatedHTML) return;
  const name = (fileTitle.value.trim() || 'ebook').replace(/[^a-z0-9_-]/gi, '-') + '.html';
  const blob = new Blob([generatedHTML], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
});

// ── Open for PDF ──────────────────────────────────────────────────────────
btnPdf.addEventListener('click', () => {
  if (!generatedHTML) return;

  const printPatch = `
    <style>
      @media print {
        a[href]::after { content: none !important; }
        .no-print, button { display: none !important; }
        @page { margin: 1.5cm; }
      }
    </style>`;

  let html = generatedHTML;
  if (html.includes('</head>')) {
    html = html.replace('</head>', printPatch + '</head>');
  } else {
    html = printPatch + html;
  }

  const win = window.open('', '_blank');
  if (!win) { alert('Permita popups neste site e tente novamente.'); return; }
  win.document.write(html);
  win.document.close();
  setTimeout(() => win.print(), 900);
});

// ── Default prompt ────────────────────────────────────────────────────────
promptTA.value = `Crie um ebook completo em HTML com o tema "10 Formas de Ganhar Dinheiro com Inteligência Artificial".

O ebook deve ter:
- Capa visual impactante com título, subtítulo e nome do autor "Fillipe Alves"
- Sumário com links internos para cada capítulo
- 10 capítulos detalhados (mínimo 400 palavras cada) com exemplos práticos e reais
- Boxes de destaque com dicas, avisos e exemplos
- Seção "Primeiros Passos" em cada capítulo
- Design profissional em dark mode (#0f0f0f background, fontes sans-serif modernas via Google Fonts)
- Tipografia elegante com hierarquia visual clara
- Rodapé em cada página com número e título do capítulo
- @media print sem URLs visíveis nos links

Público-alvo: brasileiros que querem renda extra ou transição de carreira usando IA.
Tom: didático, motivador e prático. Sem jargão técnico excessivo.`;
</script>
</body>
</html>
