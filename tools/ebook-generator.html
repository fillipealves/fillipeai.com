<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ebook Generator — Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060a;--s1:rgba(255,255,255,.03);--s2:rgba(255,255,255,.06);
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.12);
  --text:#f1f0ff;--muted:#6b6a80;
  --purple:#7c6aff;--purple2:#a78bfa;
  --green:#34d399;--red:#f87171;--cyan:#22d3ee;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 40% at 0% 0%,rgba(124,106,255,.08) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

/* HEADER */
header{
  padding:.75rem 1.5rem;
  border-bottom:1px solid var(--b1);
  display:flex;align-items:center;gap:.65rem;
  flex-shrink:0;height:48px;
  background:rgba(6,6,10,.85);backdrop-filter:blur(20px);
  position:relative;z-index:10;
}
.h-icon{width:24px;height:24px;background:linear-gradient(135deg,var(--purple),var(--cyan));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;color:#fff;flex-shrink:0}
header a{color:var(--muted);text-decoration:none;font-size:.8rem;font-weight:500;transition:color .15s}
header a:hover{color:var(--text)}
header .sep{color:rgba(255,255,255,.12)}
header h1{font-size:.88rem;font-weight:700;color:var(--text)}
.h-chip{
  margin-left:auto;
  background:rgba(124,106,255,.12);border:1px solid rgba(124,106,255,.25);
  color:var(--purple2);font-size:.65rem;font-weight:700;
  padding:2px 8px;border-radius:5px;letter-spacing:.04em;
}

/* LAYOUT */
main{flex:1;display:grid;grid-template-columns:360px 1fr;overflow:hidden;height:calc(100vh - 48px);position:relative;z-index:1}

/* SIDEBAR */
.sidebar{
  border-right:1px solid var(--b1);
  display:flex;flex-direction:column;overflow:hidden;
  background:rgba(8,8,14,.6);backdrop-filter:blur(10px);
}

/* Mode switcher */
.mode-switch{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--b1);flex-shrink:0}
.mode-btn{
  padding:.65rem;font-size:.78rem;font-weight:600;
  color:var(--muted);background:none;border:none;cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .15s;display:flex;align-items:center;justify-content:center;gap:.35rem;
  font-family:inherit;
}
.mode-btn:hover{color:var(--text);background:var(--s1)}
.mode-btn.active{color:var(--text);border-bottom-color:var(--purple);background:var(--s1)}
.mode-btn:first-child{border-right:1px solid var(--b1)}

/* Panels */
.mode-panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.mode-panel.active{display:flex}

/* Upload mode */
.dropzone{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.85rem;padding:2rem;cursor:pointer;transition:background .15s;position:relative;
}
.dropzone:hover,.dropzone.over{background:var(--s2)}
.dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-ring{
  width:64px;height:64px;border:2px dashed rgba(124,106,255,.25);
  border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:1.75rem;transition:all .2s;
  background:rgba(124,106,255,.06);
}
.dropzone:hover .drop-ring,.dropzone.over .drop-ring{border-color:rgba(124,106,255,.5);background:rgba(124,106,255,.1)}
.drop-title{font-size:.88rem;color:var(--muted);font-weight:600}
.drop-sub{font-size:.74rem;color:rgba(255,255,255,.2)}

.file-loaded{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:.85rem;padding:1.5rem}
.file-card{
  background:var(--s2);border:1px solid var(--b1);border-radius:10px;
  padding:.85rem 1rem;display:flex;align-items:center;gap:.7rem;width:100%;
}
.file-card-icon{width:34px;height:34px;background:rgba(124,106,255,.12);border:1px solid rgba(124,106,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.file-card-name{font-size:.82rem;color:var(--text);font-weight:600;word-break:break-all;flex:1}
.file-card-size{font-size:.72rem;color:var(--muted);margin-top:2px}
.btn-clear{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;border-radius:4px;font-size:.85rem;flex-shrink:0;transition:color .15s}
.btn-clear:hover{color:var(--red)}

/* AI mode */
.ai-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.ai-settings{padding:.85rem 1rem;border-bottom:1px solid var(--b1);display:flex;flex-direction:column;gap:.6rem;flex-shrink:0}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.field{display:flex;flex-direction:column;gap:.35rem}
.field label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}

input,select,textarea{
  background:rgba(255,255,255,.04);
  border:1px solid var(--b1);border-radius:8px;
  color:var(--text);font-family:inherit;font-size:.82rem;
  padding:.5rem .7rem;outline:none;
  transition:border-color .2s,box-shadow .2s;width:100%;
}
input:focus,select:focus,textarea:focus{
  border-color:rgba(124,106,255,.5);
  box-shadow:0 0 0 3px rgba(124,106,255,.1);
}
select option{background:#0f0f18}

.prompt-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:.85rem 1rem;gap:.4rem}
.prompt-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.prompt-hint{font-size:.65rem;color:rgba(255,255,255,.15);text-transform:none;letter-spacing:0;font-weight:400}
.prompt-wrap textarea{flex:1;min-height:60px;font-size:.78rem;line-height:1.6;resize:none}

/* Footer */
.sidebar-footer{padding:.85rem 1rem;border-top:1px solid var(--b1);display:flex;flex-direction:column;gap:.4rem;flex-shrink:0}
.btn-main{
  width:100%;padding:.65rem;border-radius:9px;border:none;cursor:pointer;
  font-size:.84rem;font-weight:700;font-family:inherit;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.4rem;
}
.btn-generate{
  background:linear-gradient(135deg,var(--purple),#9d6fff);color:#fff;
  box-shadow:0 4px 20px rgba(124,106,255,.3);
}
.btn-generate:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,106,255,.45)}
.btn-generate:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-stop{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--red)}
.btn-stop:hover{background:rgba(248,113,113,.15)}
.btn-secondary{background:var(--s2);border:1px solid var(--b1);color:var(--muted)}
.btn-secondary:hover:not(:disabled){background:rgba(255,255,255,.08);color:var(--text)}
.btn-secondary:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{background:none;border:1px solid var(--b1);color:rgba(255,255,255,.2);font-size:.75rem}
.btn-ghost:hover{color:var(--muted);border-color:var(--b2)}
.meta-row{display:flex;align-items:center;justify-content:space-between;font-size:.68rem;color:rgba(255,255,255,.18);padding:0 .1rem}

/* CONTENT */
.content{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.content-tabs{
  display:flex;align-items:stretch;
  border-bottom:1px solid var(--b1);flex-shrink:0;height:42px;
  background:rgba(6,6,10,.5);
}
.ctab{
  padding:0 1.1rem;font-size:.78rem;font-weight:600;color:var(--muted);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;
  transition:color .15s;display:flex;align-items:center;gap:.35rem;
}
.ctab:hover{color:var(--text)}
.ctab.active{color:var(--text);border-bottom-color:var(--purple)}
.ctab-actions{margin-left:auto;display:flex;align-items:center;gap:.4rem;padding:0 .75rem}
.btn-sm{
  padding:.3rem .75rem;border-radius:6px;border:1px solid var(--b1);
  background:var(--s1);color:var(--muted);cursor:pointer;
  font-size:.74rem;font-weight:600;font-family:inherit;
  transition:all .15s;display:flex;align-items:center;gap:.3rem;white-space:nowrap;
}
.btn-sm:hover:not(:disabled){background:var(--s2);color:var(--text);border-color:var(--b2)}
.btn-sm:disabled{opacity:.3;cursor:not-allowed}

.panel-body{flex:1;overflow:auto;position:relative}
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:.75rem;
}
.empty-icon{
  width:64px;height:64px;
  background:linear-gradient(135deg,rgba(124,106,255,.1),rgba(34,211,238,.06));
  border:1px solid rgba(124,106,255,.15);border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.75rem;
}
.empty-text{font-size:.82rem;color:rgba(255,255,255,.2);font-weight:500}
.empty-sub{font-size:.72rem;color:rgba(255,255,255,.1)}

#code-view{
  display:none;
  background:#030307;padding:1.25rem;
  font-family:'JetBrains Mono',monospace;font-size:.74rem;line-height:1.7;
  color:#7c9e6e;white-space:pre-wrap;word-break:break-word;min-height:100%;
}
#code-view.on{display:block}
.blink{display:inline-block;width:2px;height:.9em;background:#7c9e6e;margin-left:1px;vertical-align:text-bottom;animation:bl 1s step-end infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

#preview-frame{display:none;width:100%;height:100%;border:none;background:#fff}
#preview-frame.on{display:block}

/* STATUS BAR */
.statusbar{
  padding:.4rem 1rem;border-top:1px solid var(--b1);
  font-size:.7rem;color:rgba(255,255,255,.2);
  display:flex;align-items:center;gap:.6rem;flex-shrink:0;
  background:rgba(6,6,10,.5);
}
.sdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.1);flex-shrink:0}
.sdot.spin{background:var(--purple);animation:pulse 1.2s ease-in-out infinite;box-shadow:0 0 6px var(--purple)}
.sdot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.sdot.err{background:var(--red);box-shadow:0 0 6px var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
</style>
</head>
<body>

<header>
  <div class="h-icon">F</div>
  <a href="/">fillipeai.com</a>
  <span class="sep">/</span>
  <a href="/tools">tools</a>
  <span class="sep">/</span>
  <h1>ebook-generator</h1>
  <span class="h-chip">Claude AI</span>
</header>

<main>
  <div class="sidebar">
    <div class="mode-switch">
      <button class="mode-btn active" data-mode="ai">✦ Gerar com IA</button>
      <button class="mode-btn" data-mode="upload">📤 Upload HTML</button>
    </div>

    <!-- AI MODE -->
    <div class="mode-panel active" id="panel-ai">
      <div class="ai-panel">
        <div class="ai-settings">
          <div class="field-row">
            <div class="field">
              <label>Modelo</label>
              <select id="model">
                <option value="claude-haiku-4-5-20251001">Haiku — rápido</option>
                <option value="claude-sonnet-4-6" selected>Sonnet — padrão</option>
                <option value="claude-opus-4-6">Opus — máximo</option>
              </select>
            </div>
            <div class="field">
              <label>Nome do arquivo</label>
              <input type="text" id="file-title" value="ebook" placeholder="meu-ebook">
            </div>
          </div>
        </div>
        <div class="prompt-wrap">
          <div class="prompt-label">
            Prompt
            <span class="prompt-hint">Ctrl+Enter para gerar</span>
          </div>
          <textarea id="prompt"></textarea>
        </div>
      </div>
    </div>

    <!-- UPLOAD MODE -->
    <div class="mode-panel" id="panel-upload">
      <div class="dropzone" id="dropzone">
        <input type="file" accept=".html,.htm" id="file-input">
        <div class="drop-ring">📄</div>
        <div class="drop-title">Arraste um arquivo HTML</div>
        <div class="drop-sub">ou clique para selecionar</div>
      </div>
      <div class="file-loaded" id="file-loaded">
        <div class="file-card">
          <div class="file-card-icon">🗒️</div>
          <div style="flex:1;min-width:0">
            <div class="file-card-name" id="fname">—</div>
            <div class="file-card-size" id="fsize">—</div>
          </div>
          <button class="btn-clear" id="btn-clear" title="Remover">✕</button>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="sidebar-footer">
      <button class="btn-main btn-generate" id="btn-generate">✦ Gerar Ebook</button>
      <button class="btn-main btn-stop" id="btn-stop" style="display:none">⏹ Parar geração</button>
      <button class="btn-main btn-secondary" id="btn-pdf" disabled>🖨 Abrir para PDF</button>
      <button class="btn-main btn-ghost" id="btn-test">🔌 Testar conexão</button>
      <div class="meta-row">
        <span id="token-info">—</span>
        <span id="status-label">aguardando</span>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">
    <div class="content-tabs">
      <div class="ctab active" data-tab="preview">👁 Prévia</div>
      <div class="ctab" data-tab="code">🗒 HTML</div>
      <div class="ctab-actions">
        <button class="btn-sm btn-dl" id="btn-dl" disabled>⬇ Download</button>
      </div>
    </div>
    <div class="panel-body">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">✦</div>
        <span class="empty-text">Nenhum ebook gerado ainda</span>
        <span class="empty-sub">Configure o prompt e clique em Gerar</span>
      </div>
      <div id="code-view"></div>
      <iframe id="preview-frame" sandbox="allow-same-origin allow-scripts"></iframe>
    </div>
    <div class="statusbar">
      <div class="sdot" id="sdot"></div>
      <span id="stext">aguardando</span>
    </div>
  </div>
</main>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const BACKEND_URL = 'https://fillipeaicom-production.up.railway.app';

// ── refs ─────────────────────────────────────────────────────────────────
const modelEl    = document.getElementById('model');
const fileTitleEl= document.getElementById('file-title');
const promptEl   = document.getElementById('prompt');
const btnGenerate= document.getElementById('btn-generate');
const btnStop    = document.getElementById('btn-stop');
const btnPdf     = document.getElementById('btn-pdf');
const btnDl      = document.getElementById('btn-dl');
const tokenInfo  = document.getElementById('token-info');
const statusLabel= document.getElementById('status-label');
const sdot       = document.getElementById('sdot');
const stext      = document.getElementById('stext');
const emptyState = document.getElementById('empty-state');
const codeView   = document.getElementById('code-view');
const previewFr  = document.getElementById('preview-frame');
const dropzone   = document.getElementById('dropzone');
const fileInput  = document.getElementById('file-input');
const fileLoaded = document.getElementById('file-loaded');
const fnameEl    = document.getElementById('fname');
const fsizeEl    = document.getElementById('fsize');
const btnClear   = document.getElementById('btn-clear');

// ── state ─────────────────────────────────────────────────────────────────
let currentHTML  = '';
let activeMode   = 'ai';   // 'ai' | 'upload'
let activeTab    = 'preview';
let abort        = null;

// ── mode switch ───────────────────────────────────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    activeMode = btn.dataset.mode;
    document.getElementById('panel-' + activeMode).classList.add('active');
    // Update generate button label
    btnGenerate.textContent = activeMode === 'ai' ? '✦ Gerar Ebook' : '👁 Visualizar';
    btnGenerate.disabled = activeMode === 'upload' && !currentHTML;
  };
});

// ── tabs ──────────────────────────────────────────────────────────────────
document.querySelectorAll('.ctab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.ctab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeTab = t.dataset.tab;
    refreshView();
  };
});

function refreshView() {
  if (!currentHTML) return;
  if (activeTab === 'code') {
    codeView.classList.add('on');
    previewFr.classList.remove('on');
    previewFr.style.display = 'none';
  } else {
    codeView.classList.remove('on');
    previewFr.classList.add('on');
    previewFr.style.display = 'block';
  }
}

// ── status helper ─────────────────────────────────────────────────────────
function setStatus(text, type) {
  stext.textContent = text;
  statusLabel.textContent = text;
  sdot.className = 'sdot' + (type ? ' ' + type : '');
}

// ── preview helper ────────────────────────────────────────────────────────
let prevBlobUrl = '';
let previewTimer = null;
function schedulePreview(html, immediate) {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(() => {
    if (!html) return;
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    previewFr.src = url;
    previewFr.style.display = 'block';
    if (prevBlobUrl) URL.revokeObjectURL(prevBlobUrl);
    prevBlobUrl = url;
    emptyState.style.display = 'none';
  }, immediate ? 0 : 600);
}

// ── extract HTML from Claude response ────────────────────────────────────
function extractHTML(raw) {
  const m = raw.match(/```html\s*([\s\S]*?)```/i);
  if (m) return m[1].trim();
  const d = raw.match(/(<!DOCTYPE[\s\S]*)/i);
  if (d) return d[1].trim();
  return raw.trim();
}

// ── file size format ──────────────────────────────────────────────────────
function fmtSize(b) {
  return b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(1) + ' KB' : (b/1048576).toFixed(1) + ' MB';
}

// ── upload mode ───────────────────────────────────────────────────────────
function loadFile(file) {
  if (!file?.name.match(/\.html?$/i)) { alert('Selecione um arquivo .html'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    currentHTML = e.target.result;
    fnameEl.textContent = file.name;
    fsizeEl.textContent = fmtSize(file.size);
    dropzone.style.display = 'none';
    fileLoaded.style.display = 'flex';
    btnPdf.disabled = false;
    btnDl.disabled = false;
    btnGenerate.disabled = false;
    schedulePreview(currentHTML, true);
    if (activeTab === 'code') { codeView.textContent = currentHTML; codeView.classList.add('on'); }
    setStatus('arquivo carregado', 'ok');
  };
  reader.readAsText(file);
}

fileInput.onchange = e => { if (e.target.files[0]) loadFile(e.target.files[0]); };

btnClear.onclick = () => {
  currentHTML = '';
  fileInput.value = '';
  dropzone.style.display = '';
  fileLoaded.style.display = 'none';
  btnPdf.disabled = true;
  btnDl.disabled = true;
  btnGenerate.disabled = true;
  previewFr.classList.remove('on');
  previewFr.style.display = 'none';
  codeView.classList.remove('on');
  emptyState.style.display = '';
  setStatus('aguardando', '');
};

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

// ── main action button ────────────────────────────────────────────────────
btnGenerate.onclick = () => {
  if (activeMode === 'upload') {
    // Just show preview/code of uploaded file
    refreshView();
    return;
  }
  generate();
};

promptEl.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') generate();
});

// ── Auth token helper ─────────────────────────────────────────────────────
function getJwt() { return localStorage.getItem('da_token') || ''; }

// ── SSE stream helper (via backend proxy) ─────────────────────────────────
async function streamGenerate({ model, prompt, system, onChunk, onUsage, signal }) {
  const jwt = getJwt();
  if (!jwt) throw new Error('Você precisa estar logado no dashboard para usar o gerador.');

  const res = await fetch(`${BACKEND_URL}/ai/generate`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${jwt}`,
    },
    body: JSON.stringify({ model, prompt, system }),
    signal,
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error || 'HTTP ' + res.status);
  }

  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const d = line.slice(6).trim();
      if (d === '[DONE]') continue;
      try {
        const ev = JSON.parse(d);
        if (ev.type === 'error') throw new Error(ev.error);
        if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') {
          onChunk(ev.delta.text);
        }
        if (ev.type === 'message_delta' && ev.usage) {
          onUsage(ev.usage.output_tokens || 0);
        }
      } catch (e) { if (e.message !== 'Unexpected end of JSON input') throw e; }
    }
  }
}

// ── AI generate ───────────────────────────────────────────────────────────
async function generate() {
  const prompt = promptEl.value.trim();
  if (!prompt) { alert('Escreva um prompt.'); promptEl.focus(); return; }

  if (!getJwt()) {
    alert('Você precisa estar logado no dashboard.\nAcesse fillipeai.com/dashboard primeiro.');
    return;
  }

  // Reset UI
  currentHTML = '';
  codeView.textContent = '';
  codeView.classList.remove('on');
  previewFr.classList.remove('on');
  previewFr.style.display = 'none';
  emptyState.style.display = 'none';
  btnDl.disabled = true;
  btnPdf.disabled = true;
  btnGenerate.style.display = 'none';
  btnStop.style.display = 'flex';
  tokenInfo.textContent = '—';
  setStatus('gerando...', 'spin');

  const cursor = document.createElement('span');
  cursor.className = 'blink';
  codeView.appendChild(cursor);
  codeView.style.display = 'block';

  abort = new AbortController();
  let raw = '', outTok = 0;

  try {
    await streamGenerate({
      model: modelEl.value,
      prompt,
      system: `Você é um designer e redator especializado em ebooks digitais.
Gere SEMPRE um arquivo HTML completo e autocontido (sem dependências externas exceto Google Fonts CDN).
O HTML deve:
- Ser um ebook visual, profissional e bem diagramado
- Usar design moderno com tipografia elegante
- Incluir sumário clicável (âncoras internas)
- Ter CSS embutido no <style> (dark mode ou light conforme o tema)
- Incluir @media print (sem URLs visíveis, margens adequadas, page-break-inside: avoid em seções importantes)
- Ter todos os capítulos completos e detalhados
- Retornar SOMENTE o código HTML entre \`\`\`html e \`\`\` sem texto fora do bloco`,
      signal: abort.signal,
      onChunk: (text) => {
        raw += text;
        cursor.remove();
        codeView.textContent = raw;
        codeView.appendChild(cursor);
        codeView.scrollTop = codeView.scrollHeight;
        currentHTML = extractHTML(raw);
        schedulePreview(currentHTML);
      },
      onUsage: (tokens) => {
        outTok = tokens;
        tokenInfo.textContent = `↓${tokens} tokens`;
      },
    });

    currentHTML = extractHTML(raw);
    cursor.remove();
    schedulePreview(currentHTML, true);

    if (activeTab === 'preview') {
      codeView.classList.remove('on');
    } else {
      codeView.classList.add('on');
      codeView.textContent = raw;
    }

    if (currentHTML) { btnDl.disabled = false; btnPdf.disabled = false; }
    setStatus(`concluído — ${outTok} tokens`, 'ok');

  } catch (err) {
    cursor.remove();
    if (err.name === 'AbortError') {
      setStatus('cancelado', '');
      currentHTML = extractHTML(raw);
      if (currentHTML) { btnDl.disabled = false; btnPdf.disabled = false; schedulePreview(currentHTML, true); }
    } else {
      setStatus('erro: ' + err.message, 'err');
      codeView.textContent = '❌ ' + err.message;
      codeView.classList.add('on');
    }
  } finally {
    abort = null;
    btnGenerate.style.display = 'flex';
    btnStop.style.display = 'none';
  }
}

btnStop.onclick = () => { if (abort) abort.abort(); };

// ── Testar conexão ────────────────────────────────────────────────────────
document.getElementById('btn-test').addEventListener('click', async () => {
  const btn = document.getElementById('btn-test');
  btn.textContent = '⏳ Testando...';
  btn.disabled = true;
  emptyState.style.display = 'none';
  codeView.classList.add('on');
  codeView.textContent = '⏳ Testando conexão com o backend...\n';

  try {
    // 1. Testa health do backend
    const health = await fetch(`${BACKEND_URL}/health`);
    const hData = await health.json();
    codeView.textContent += `✅ Backend OK — ${hData.ts}\n`;

    // 2. Testa autenticação
    const jwt = getJwt();
    if (!jwt) {
      codeView.textContent += '\n⚠️  Sem token JWT.\n→ Faça login em fillipeai.com/dashboard primeiro.';
      setStatus('sem login', 'err');
      return;
    }

    const verify = await fetch(`${BACKEND_URL}/auth/verify`, {
      headers: { 'Authorization': `Bearer ${jwt}` },
    });
    const vData = await verify.json();

    if (verify.ok) {
      codeView.textContent += `✅ Login OK — usuário: ${vData.username}\n`;
      codeView.textContent += '\n✅ Tudo pronto! Pode clicar em Gerar Ebook.';
      setStatus('pronto', 'ok');
    } else {
      codeView.textContent += `\n❌ Token expirado ou inválido.\n→ Faça login novamente em fillipeai.com/dashboard`;
      setStatus('token expirado', 'err');
    }
  } catch (err) {
    codeView.textContent += `\n❌ ${err.message}\n→ Backend offline ou inacessível.`;
    setStatus('erro', 'err');
  }

  btn.textContent = '🔌 Testar conexão com API';
  btn.disabled = false;
});

// ── PDF helper ────────────────────────────────────────────────────────────
function openPdf() {
  if (!currentHTML) return;
  const patch = `<style>@media print{a[href]::after{content:none!important}.no-print,button{display:none!important}@page{margin:1.5cm}}</style>`;
  let html = currentHTML;
  html = html.includes('</head>') ? html.replace('</head>', patch + '</head>') : patch + html;
  const win = window.open('', '_blank');
  if (!win) { alert('Permita popups e tente novamente.'); return; }
  win.document.write(html);
  win.document.close();
  setTimeout(() => win.print(), 800);
}
btnPdf.onclick = openPdf;

// ── Download ──────────────────────────────────────────────────────────────
btnDl.onclick = () => {
  if (!currentHTML) return;
  const name = (fileTitleEl.value.trim() || 'ebook').replace(/[^a-z0-9_-]/gi, '-') + '.html';
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([currentHTML], { type: 'text/html' })),
    download: name,
  });
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
};
